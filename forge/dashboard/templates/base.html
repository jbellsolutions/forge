<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}forge{% endblock %} · forge dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/htmx.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#f8fafc', 100:'#f1f5f9', 600:'#475569', 700:'#334155', 900:'#0f172a' }}}}
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="/workspace" class="flex items-center gap-2 text-lg font-semibold tracking-tight">
        <span class="inline-block w-6 h-6 rounded bg-slate-900"></span>
        <span>forge</span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        {% set tab = request.url.path %}
        <a href="/workspace"
           class="px-3 py-1.5 rounded-md {{ 'bg-slate-100 font-medium' if tab.startswith('/workspace') else 'hover:bg-slate-100' }}">
          Workspace
        </a>
        <a href="/changelog"
           class="px-3 py-1.5 rounded-md {{ 'bg-slate-100 font-medium' if tab.startswith('/changelog') else 'hover:bg-slate-100' }}">
          Changelog
        </a>
        <a href="/genome"
           class="px-3 py-1.5 rounded-md {{ 'bg-slate-100 font-medium' if tab.startswith('/genome') else 'hover:bg-slate-100' }}">
          Genome
        </a>
        <a href="/logout" class="ml-3 px-3 py-1.5 rounded-md text-slate-500 hover:bg-slate-100 hover:text-slate-700 text-xs">Logout</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-xs text-slate-400 text-center py-6">
    forge — self-improving agent harness
  </footer>
</body>
</html>
