<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>forge — sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center">
  <form method="post" action="/login" class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">
    <div class="flex items-center gap-2 mb-6">
      <span class="inline-block w-6 h-6 rounded bg-slate-900"></span>
      <h1 class="text-lg font-semibold">forge dashboard</h1>
    </div>
    <label class="block text-sm text-slate-600 mb-1" for="password">Password</label>
    <input type="password" name="password" id="password" autofocus required
           class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
    {% if error %}
    <p class="text-rose-600 text-sm mt-2">{{ error }}</p>
    {% endif %}
    <button type="submit"
            class="w-full mt-4 bg-slate-900 text-white text-sm font-medium rounded-md py-2 hover:bg-slate-800">
      Sign in
    </button>
    <p class="text-xs text-slate-400 mt-4 text-center">
      Single-operator dashboard. Set <code>DASHBOARD_PASSWORD</code> in Railway env.
    </p>
  </form>
</body>
</html>
